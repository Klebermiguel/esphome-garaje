name: Build ESPHome Firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build ESPHome firmware
        uses: esphome/build-action@v1
        with:
          yaml-file: esp-garaje.yaml
